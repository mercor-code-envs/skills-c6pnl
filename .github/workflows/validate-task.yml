name: Validate Task

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

on:
    pull_request:
        branches:
            - main
        paths:
            - "tasks/**"
    workflow_dispatch:
        inputs:
            task_name:
                description: "Task name to validate (e.g. jwt-claims-validator)"
                required: false
                type: string

jobs:
    validate:
        name: Skills QC
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed task
              id: detect
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.task_name }}" ]; then
                    echo "task=${{ inputs.task_name }}" >> $GITHUB_OUTPUT
                    echo "has_changes=true" >> $GITHUB_OUTPUT
                  else
                    BASE="origin/${{ github.base_ref }}"
                    CHANGED=$(git diff --name-only $BASE...HEAD \
                      | grep '^tasks/' \
                      | cut -d'/' -f1-2 \
                      | sort -u \
                      | head -1)
                    if [ -z "$CHANGED" ]; then
                      echo "has_changes=false" >> $GITHUB_OUTPUT
                      echo "No task changes detected"
                    else
                      TASK=$(echo "$CHANGED" | sed 's|tasks/||')
                      echo "task=$TASK" >> $GITHUB_OUTPUT
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Set up Python
              if: steps.detect.outputs.has_changes == 'true'
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              if: steps.detect.outputs.has_changes == 'true'
              run: pip install requests pyyaml

            - name: Configure AWS credentials
              if: steps.detect.outputs.has_changes == 'true'
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: us-east-1

            - name: Run Skills QC
              id: qc
              if: steps.detect.outputs.has_changes == 'true'
              continue-on-error: true
              env:
                  QC_API_KEY: ${{ secrets.QC_API_KEY }}
                  VALIDATION_API_URL: ${{ secrets.VALIDATION_API_URL }}
                  S3_BUCKET_TEMP: ${{ secrets.S3_BUCKET_TEMP }}
                  GITHUB_WRITER: ${{ secrets.GITHUB_WRITER }}
              run: |
                  python tooling/ci_scripts/task_qc.py \
                    --task-name "${{ steps.detect.outputs.task }}"
                  echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

            - name: Post PR comment
              if: always() && github.event_name == 'pull_request' && steps.detect.outputs.has_changes == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const taskName = '${{ steps.detect.outputs.task }}';
                      const marker = `<!-- skills-qc-${taskName} -->`;

                      let body;
                      if (fs.existsSync('qc-comment.md')) {
                        body = fs.readFileSync('qc-comment.md', 'utf8');
                      } else {
                        body = marker + '\n## ❌ Skills QC — FAILED\n\n**Task:** `' + taskName + '`\n\nQC script did not produce output. Check workflow logs.\n\n---\n<sub>Automated by [validate-task](.github/workflows/validate-task.yml)</sub>';
                      }

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                      });

                      const existing = comments.find(c =>
                        c.user.type === 'Bot' && c.body.includes(marker)
                      );

                      const params = {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body,
                      };

                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...params,
                          comment_id: existing.id,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          ...params,
                          issue_number: context.payload.pull_request.number,
                        });
                      }

            - name: Fail if QC did not pass
              if: steps.detect.outputs.has_changes == 'true' && steps.qc.outputs.exit_code != '0'
              run: |
                  echo "Skills QC failed — see PR comment for details"
                  exit 1
