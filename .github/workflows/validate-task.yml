name: Validate Task

on:
    pull_request:
        branches:
            - main
        paths:
            - "tasks/**"
    workflow_dispatch:
        inputs:
            task_name:
                description: "Task name to validate (e.g. jwt-claims-validator)"
                required: false
                type: string

jobs:
    validate:
        name: Skills QC
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed task
              id: detect
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.task_name }}" ]; then
                    echo "task=${{ inputs.task_name }}" >> $GITHUB_OUTPUT
                    echo "has_changes=true" >> $GITHUB_OUTPUT
                  else
                    BASE="origin/${{ github.base_ref }}"
                    CHANGED=$(git diff --name-only $BASE...HEAD \
                      | grep '^tasks/' \
                      | cut -d'/' -f1-2 \
                      | sort -u \
                      | head -1)
                    if [ -z "$CHANGED" ]; then
                      echo "has_changes=false" >> $GITHUB_OUTPUT
                      echo "No task changes detected"
                    else
                      TASK=$(echo "$CHANGED" | sed 's|tasks/||')
                      echo "task=$TASK" >> $GITHUB_OUTPUT
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Set up Python
              if: steps.detect.outputs.has_changes == 'true'
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install dependencies
              if: steps.detect.outputs.has_changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_WRITER }}
              run: |
                  pip install requests pyyaml pytest
                  pip install "skills-ref @ git+https://${GH_TOKEN}@github.com/agentskills/agentskills.git#subdirectory=skills-ref"

            - name: Run validate_task
              id: validate
              if: steps.detect.outputs.has_changes == 'true'
              run: |
                  set +e
                  python tooling/validate_task.py \
                    --task-name "${{ steps.detect.outputs.task }}" \
                    2>&1 | tee /tmp/validate-output.txt
                  EXIT_CODE=${PIPESTATUS[0]}
                  echo "exit_code=${EXIT_CODE}" >> $GITHUB_OUTPUT

            - name: Post PR comment
              if: always() && github.event_name == 'pull_request' && steps.detect.outputs.has_changes == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const taskName = '${{ steps.detect.outputs.task }}';
                      const marker = `<!-- skills-validate-${taskName} -->`;
                      const exitCode = '${{ steps.validate.outputs.exit_code }}';
                      const passed = exitCode === '0';
                      const icon = passed ? '✅' : '❌';
                      const status = passed ? 'PASSED' : 'FAILED';

                      let details = '';
                      if (fs.existsSync('/tmp/validate-output.txt')) {
                        const raw = fs.readFileSync('/tmp/validate-output.txt', 'utf8').trim();
                        if (raw) details = `\n\`\`\`\n${raw}\n\`\`\`\n`;
                      }

                      const body = `${marker}\n## ${icon} Validate Task — ${status} — \`${taskName}\`\n${details}\n---\n<sub>Automated by [validate-task](.github/workflows/validate-task.yml)</sub>`;

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                      });

                      const existing = comments.find(c =>
                        c.user.type === 'Bot' && c.body.includes(marker)
                      );

                      const params = {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body,
                      };

                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...params,
                          comment_id: existing.id,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          ...params,
                          issue_number: context.payload.pull_request.number,
                        });
                      }

            - name: Fail if validation did not pass
              if: steps.detect.outputs.has_changes == 'true' && steps.validate.outputs.exit_code != '0'
              run: |
                  echo "validate_task.py failed — fix issues before merging"
                  exit 1
