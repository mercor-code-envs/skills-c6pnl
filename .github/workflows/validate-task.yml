name: Validate Task

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

on:
    pull_request:
        branches:
            - main
        paths:
            - "tasks/**"
    workflow_dispatch:
        inputs:
            task_name:
                description: "Task name to validate (e.g. jwt-claims-validator)"
                required: false
                type: string

jobs:
    validate:
        name: Validate Task Structure
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect changed task
              id: detect
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.task_name }}" ]; then
                    echo "task=${{ inputs.task_name }}" >> $GITHUB_OUTPUT
                    echo "has_changes=true" >> $GITHUB_OUTPUT
                  else
                    BASE="origin/${{ github.base_ref }}"
                    CHANGED=$(git diff --name-only $BASE...HEAD \
                      | grep '^tasks/' \
                      | cut -d'/' -f1-2 \
                      | sort -u \
                      | head -1)
                    if [ -z "$CHANGED" ]; then
                      echo "has_changes=false" >> $GITHUB_OUTPUT
                      echo "No task changes detected"
                    else
                      TASK=$(echo "$CHANGED" | sed 's|tasks/||')
                      echo "task=$TASK" >> $GITHUB_OUTPUT
                      echo "has_changes=true" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Set up Python
              if: steps.detect.outputs.has_changes == 'true'
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Run validator
              id: validate
              if: steps.detect.outputs.has_changes == 'true'
              continue-on-error: true
              run: |
                  python tooling/validate_task.py \
                    --task-name "${{ steps.detect.outputs.task }}" \
                    2>&1 | tee validation_output.txt
                  echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

            - name: Post PR comment
              if: always() && github.event_name == 'pull_request' && steps.detect.outputs.has_changes == 'true'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const taskName = '${{ steps.detect.outputs.task }}';
                      const passed = '${{ steps.validate.outputs.exit_code }}' === '0';

                      function parseOutput(filePath) {
                        if (!fs.existsSync(filePath)) return { errors: [], warnings: [] };
                        const content = fs.readFileSync(filePath, 'utf8');
                        const errors = [];
                        const warnings = [];
                        let section = null;
                        for (const line of content.split('\n')) {
                          if (line.startsWith('Errors:'))   { section = 'errors';   continue; }
                          if (line.startsWith('Warnings:')) { section = 'warnings'; continue; }
                          if (line.startsWith('All checks passed')) { section = null; continue; }
                          const match = line.match(/^\s+-\s+(.+)$/);
                          if (match && section === 'errors')   errors.push(match[1]);
                          if (match && section === 'warnings') warnings.push(match[1]);
                        }
                        return { errors, warnings };
                      }

                      const { errors, warnings } = parseOutput('validation_output.txt');
                      const icon = passed ? '✅' : '❌';
                      const status = passed ? 'PASSED' : 'FAILED';

                      let body = `## ${icon} Task Validation ${status}\n\n**Task:** \`${taskName}\`\n\n`;

                      if (errors.length > 0) {
                        body += `### Errors\n${errors.map(e => `- ${e}`).join('\n')}\n\n`;
                      }
                      if (warnings.length > 0) {
                        body += `### Warnings\n${warnings.map(w => `- ⚠️ ${w}`).join('\n')}\n\n`;
                      }
                      if (passed) {
                        body += '_All structural checks passed._\n\n';
                      }

                      body += `---\n<sub>Automated by [validate-task](.github/workflows/validate-task.yml)</sub>`;

                      const marker = `<!-- validate-${taskName} -->`;
                      body = marker + '\n' + body;

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                      });

                      const existing = comments.find(c =>
                        c.user.type === 'Bot' && c.body.includes(marker)
                      );

                      const params = {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body,
                      };

                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...params,
                          comment_id: existing.id,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          ...params,
                          issue_number: context.payload.pull_request.number,
                        });
                      }

            - name: Fail if validation errors found
              if: steps.detect.outputs.has_changes == 'true' && steps.validate.outputs.exit_code != '0'
              run: |
                  echo "Task validation failed — see errors above"
                  exit 1
