name: Poll and Setup Claimed Tasks

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Find and dispatch setup for newly claimed tasks
        env:
          AT_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, subprocess, os, urllib.request

          AT_TOKEN = os.environ["AT_TOKEN"]
          GH_TOKEN = os.environ["GH_TOKEN"]
          BASE = "appVMECzrlP3j1BFm"
          TABLE = "tblkLmyEvZfWY5J31"

          # Tasks that are Claimed but not yet set up (time_in_progress is empty)
          formula = "AND({task_status}='Claimed',{time_in_progress}='')"
          fields = ["repo__task","title","s3_presigned_url","branch_name","repo","expert__id","airtable_task_id"]
          url = f"https://api.airtable.com/v0/{BASE}/{TABLE}?filterByFormula={urllib.request.quote(formula)}"
          for f in fields:
              url += f"&fields[]={f}"

          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {AT_TOKEN}"})
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())

          records = data.get("records", [])
          print(f"Found {len(records)} claimed tasks awaiting setup")

          for r in records:
              f = r["fields"]
              record_id = r["id"]
              slug = f.get("repo__task", "")
              s3_url = f.get("s3_presigned_url", "")
              branch = f.get("branch_name", "")
              repo = f.get("repo", "")
              fork_repo = repo[0] if isinstance(repo, list) else str(repo)

              if not slug or not fork_repo or not s3_url:
                  print(f"SKIP {record_id}: slug={slug!r} fork={fork_repo!r} s3={bool(s3_url)}")
                  continue

              print(f"Dispatching: {slug} -> {fork_repo}/{branch}")
              payload = json.dumps({
                  "ref": "main",
                  "inputs": {
                      "task_slug": slug,
                      "fork_repo": fork_repo,
                      "branch_name": branch,
                      "expert_github": "",
                      "s3_url": s3_url,
                      "airtable_record_id": record_id,
                  }
              }).encode()

              req = urllib.request.Request(
                  "https://api.github.com/repos/mercor-code-envs/skills-template/actions/workflows/setup-task.yml/dispatches",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {GH_TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"  -> Dispatched (HTTP {resp.status})")
              except Exception as e:
                  print(f"  -> ERROR: {e}")
          EOF
