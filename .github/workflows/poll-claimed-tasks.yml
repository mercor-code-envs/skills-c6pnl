name: Poll and Setup Claimed Tasks

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Find newly claimed tasks and trigger fork setup
        env:
          AT_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request, urllib.parse

          AT_TOKEN = os.environ["AT_TOKEN"]
          GH_TOKEN = os.environ["GH_TOKEN"]
          BASE = "appVMECzrlP3j1BFm"
          TABLE = "tblkLmyEvZfWY5J31"
          EXPERT_TABLE = "tblNvesyHUH1E1sJZ"

          def at_get(path):
              req = urllib.request.Request(
                  f"https://api.airtable.com/v0/{BASE}/{path}",
                  headers={"Authorization": f"Bearer {AT_TOKEN}"}
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def at_patch(table, record_id, fields):
              payload = json.dumps({"fields": fields}).encode()
              req = urllib.request.Request(
                  f"https://api.airtable.com/v0/{BASE}/{table}/{record_id}",
                  data=payload,
                  headers={"Authorization": f"Bearer {AT_TOKEN}", "Content-Type": "application/json"},
                  method="PATCH"
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Tasks claimed but not yet set up (time_in_progress empty)
          formula = urllib.parse.quote("AND({task_status}='Claimed',{time_in_progress}='')")
          data = at_get(f"{TABLE}?filterByFormula={formula}&fields[]=repo&fields[]=expert__id&fields[]=expert")

          records = data.get("records", [])
          print(f"Found {len(records)} claimed tasks awaiting setup")

          for r in records:
              f = r["fields"]
              record_id = r["id"]

              # Resolve fork repo from formula field
              repo_val = f.get("repo", "")
              fork_repo = (repo_val[0] if isinstance(repo_val, list) else str(repo_val)).strip()

              expert_ids = f.get("expert__id", [])
              expert_id = (expert_ids[0] if expert_ids else "").strip().lower()
              expert_links = f.get("expert", [])
              expert_record_id = expert_links[0] if expert_links else ""

              # If fork_repo blank, derive from expert_id and backfill Expert.repo
              if not fork_repo and expert_id:
                  fork_repo = f"skills-{expert_id}"
                  if expert_record_id:
                      try:
                          at_patch(EXPERT_TABLE, expert_record_id, {"repo": fork_repo})
                          print(f"  Set Expert.repo = {fork_repo}")
                      except Exception as e:
                          print(f"  WARN: Could not set Expert.repo: {e}")

              if not fork_repo:
                  print(f"SKIP {record_id}: no fork_repo resolved")
                  continue

              # Fetch expert GitHub username from Expert record
              expert_github = ""
              if expert_record_id:
                  try:
                      exp = at_get(f"{EXPERT_TABLE}/{expert_record_id}?fields[]=github_id")
                      expert_github = exp.get("fields", {}).get("github_id", "")
                  except Exception as e:
                      print(f"  WARN: Could not fetch expert github_id: {e}")

              print(f"Dispatching: fork={fork_repo} expert={expert_github} record={record_id}")

              payload = json.dumps({
                  "ref": "main",
                  "inputs": {
                      "fork_repo": fork_repo,
                      "expert_github": expert_github,
                      "airtable_record_id": record_id,
                  }
              }).encode()

              req = urllib.request.Request(
                  "https://api.github.com/repos/mercor-code-envs/skills-template/actions/workflows/setup-task.yml/dispatches",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {GH_TOKEN}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
                  method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"  -> Dispatched (HTTP {resp.status})")
              except Exception as e:
                  print(f"  -> ERROR: {e}")
          EOF
