name: Setup Expert Task

on:
  repository_dispatch:
    types: [expert-claimed-task]
  workflow_dispatch:
    inputs:
      fork_repo:
        description: 'Expert fork repo name (e.g. skills-iml8c)'
        required: true
      expert_github:
        description: 'Expert GitHub username'
        required: true
      airtable_record_id:
        description: 'Airtable task record ID'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Extract inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "fork_repo=${{ github.event.client_payload.fork_repo }}" >> $GITHUB_OUTPUT
            echo "expert_github=${{ github.event.client_payload.expert_github }}" >> $GITHUB_OUTPUT
            echo "airtable_record_id=${{ github.event.client_payload.airtable_record_id }}" >> $GITHUB_OUTPUT
          else
            echo "fork_repo=${{ inputs.fork_repo }}" >> $GITHUB_OUTPUT
            echo "expert_github=${{ inputs.expert_github }}" >> $GITHUB_OUTPUT
            echo "airtable_record_id=${{ inputs.airtable_record_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Fork skills-template for expert (if not exists)
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          FORK_REPO="${{ steps.inputs.outputs.fork_repo }}"
          if gh api repos/mercor-code-envs/$FORK_REPO 2>/dev/null | grep -q '"id"'; then
            echo "Repo mercor-code-envs/$FORK_REPO already exists"
          else
            echo "Forking skills-template -> mercor-code-envs/$FORK_REPO..."
            gh api repos/mercor-code-envs/skills-template/forks \
              --method POST \
              --field organization=mercor-code-envs \
              --field name=$FORK_REPO
            echo "Waiting for fork to be ready..."
            sleep 10
          fi

      - name: Add expert as collaborator
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          FORK_REPO="${{ steps.inputs.outputs.fork_repo }}"
          EXPERT="${{ steps.inputs.outputs.expert_github }}"
          if [ -n "$EXPERT" ] && [ "$EXPERT" != "null" ] && [ "$EXPERT" != "" ]; then
            gh api repos/mercor-code-envs/$FORK_REPO/collaborators/$EXPERT \
              --method PUT \
              --field permission=write
            echo "Added $EXPERT as collaborator on mercor-code-envs/$FORK_REPO"
          fi

      - name: Update Airtable task status to In Progress
        env:
          AT_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          RECORD_ID="${{ steps.inputs.outputs.airtable_record_id }}"
          if [ -n "$AT_TOKEN" ] && [ -n "$RECORD_ID" ]; then
            curl -s -X PATCH \
              "https://api.airtable.com/v0/appVMECzrlP3j1BFm/tblkLmyEvZfWY5J31/$RECORD_ID" \
              -H "Authorization: Bearer $AT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"fields\": {\"task_status\": \"In Progress\", \"time_in_progress\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}}"
            echo "Airtable updated: In Progress"
          fi
